<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPE 等候頁面 - 怕洽狗版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background"></div>

    <div id="notification">🎉 系統恢復！即將進入報名頁</div>

    <div class="card">
        <h1>🚧 系統忙碌中</h1>
        <p>報名人數過多，我們正在為你處理中<br>請不要重複提交 🙏</p>

        <div class="info">
            👥 排隊人數：<span id="queue">132</span><br>
            ⏱ 預估時間：<span id="time">2</span> 分鐘
        </div>

        <div class="progress-bar">
            <div class="progress"></div>
        </div>

        <p class="hint">系統每 5 秒自動重試</p>
        <button onclick="retry()">重新整理</button>
    </div>

    <div id="record-player" class="record-container">
    <div class="record">
        <div class="record-center">
            <span class="record-text">JAY</span>
        </div>
    </div>
    <div class="song-title">給我一首歌的時間</div>
</div>

    <img id="pochacco" class="pochacco" 
         src="https://upload.wikimedia.org/wikipedia/zh/e/ea/Pochacco_character.png"
         onclick="toggleMagic()"
         title="點我聽音樂！">

    <audio id="bgm" loop>
        <source src="jay.mp3" type="audio/mpeg">
        您的瀏覽器不支援音樂播放。
    </audio>

    <script src="script.js"></script>
</body>
</html>
